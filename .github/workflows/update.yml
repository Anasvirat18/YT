name: YT-M3U8

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp + node
        run: |
          sudo apt update
          sudo apt install -y nodejs

          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Fetch stream (best effort)
        run: |
          URL="https://www.youtube.com/channel/UCwXrBBZnIh2ER4lal6WbAHw/live"

          echo "Trying android client..."
          STREAM=$(yt-dlp -g "$URL" \
            --extractor-args "youtube:player_client=android" \
            --no-warnings | head -n 1)

          # fallback attempt
          if [[ "$STREAM" != http* ]]; then
            echo "Fallback attempt..."
            STREAM=$(yt-dlp -g "$URL" | head -n 1)
          fi

          echo "Result:"
          echo "$STREAM"

          # final fallback (always works)
          if [[ "$STREAM" != http* ]]; then
            echo "Using backup stream"
            STREAM="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
          fi

          echo "#EXTM3U" > manifest.m3u8
          echo "#EXTINF:-1,Live Channel" >> manifest.m3u8
          echo "$STREAM" >> manifest.m3u8

      - name: Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add manifest.m3u8
          git commit -m "update stream" || echo "no change"

          git pull --rebase origin main
          git push
