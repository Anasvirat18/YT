name: YT-M3U8-Updater

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4   # ✅ UPDATED

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Fetch YouTube M3U8
        run: |
          URL="https://www.youtube.com/watch?v=VIDEO_ID"

          STREAM=$(yt-dlp -g -f "best[protocol=m3u8]" "$URL" || true)

          if [ -z "$STREAM" ]; then
            echo "Failed to fetch stream"
            exit 0
          fi

          echo "#EXTM3U" > manifest.m3u8
          echo "#EXTINF:-1,YouTube Live" >> manifest.m3u8
          echo "$STREAM" >> manifest.m3u8

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add manifest.m3u8
          git commit -m "Auto update M3U8" || echo "No changes"

          git pull --rebase origin main
          git push origin main
